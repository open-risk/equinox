{% extends 'start/generic.html' %}

{% load static %}

{% block extrahead %}
    {{ block.super }}
    <title>Data Center Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{% static 'reporting/css/map.css' %}">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
{% endblock %}

{% block page_content %}

    <div class="app-content-header">
        <div class="container-fluid">
            <div class="row">
                <div class="col-sm-6">
                    <h3 class="m-0">Data Center Map</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="app-content">
        <div class="container-fluid">
            <div class="row">
                {% block content %}
                    {{ geodata|json_script:"geodata" }}
                    <div id="map"></div>
                    <script src="{% static 'reporting/js/small-map.js' %}"></script>
                {% endblock %}
            </div>
        </div>
    </div>

{% endblock %}
